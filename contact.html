<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #0e0e0e; --surface: #161616; --surface-hover: #1e1e1e;
    --border: #2a2a2a; --text: #e8e4de; --text-muted: #8a8580;
    --accent: #c9ff57; --accent-dim: rgba(201, 255, 87, 0.08);
    --font-body: 'DM Sans', sans-serif;
    --font-display: 'Libre Caslon Display', serif;
  }
  body { background: var(--bg); color: var(--text); font-family: var(--font-body); min-height: 100vh; overflow-x: hidden; }

  /* NAV */
  nav { display: flex; justify-content: space-between; align-items: center; padding: 24px 48px; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: rgba(14,14,14,0.92); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); z-index: 100; }
  .nav-name { font-family: var(--font-display); font-size: 22px; letter-spacing: -0.02em; }
  .nav-name a { color: var(--text); text-decoration: none; }
  .nav-links { display: flex; gap: 32px; list-style: none; }
  .nav-links a { color: var(--text-muted); text-decoration: none; font-size: 14px; font-weight: 500; letter-spacing: 0.02em; text-transform: uppercase; transition: color 0.3s; }
  .nav-links a:hover, .nav-links a.active { color: var(--text); }

  /* CONTACT LAYOUT */
  .contact { max-width: 560px; margin: 0 auto; padding: 80px 48px 160px; }

  .contact-header { margin-bottom: 40px; }
  .contact-header h1 { font-family: var(--font-display); font-size: clamp(36px, 5vw, 48px); font-weight: 400; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 12px; }
  .contact-header h1 em { font-style: italic; color: var(--accent); }
  .contact-header p { font-size: 16px; color: var(--text-muted); line-height: 1.6; }

  /* CONTACT LINKS */
  .contact-links { display: flex; flex-direction: column; gap: 16px; }
  .contact-link { display: inline-flex; align-items: center; gap: 12px; padding: 14px 24px; border: 1px solid var(--border); border-radius: 12px; color: var(--text); text-decoration: none; font-size: 15px; transition: all 0.3s; }
  .contact-link:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
  .contact-link svg { width: 18px; height: 18px; stroke: currentColor; fill: none; flex-shrink: 0; }

  /* FOOTER */
  footer { border-top: 1px solid var(--border); padding: 32px 48px; display: flex; justify-content: space-between; align-items: center; color: var(--text-muted); font-size: 13px; position: fixed; bottom: 0; left: 0; right: 0; background: rgba(14,14,14,0.92); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); z-index: 50; }
  footer a { color: var(--text-muted); text-decoration: none; transition: color 0.3s; }
  footer a:hover { color: var(--text); }
  .footer-links { display: flex; gap: 24px; }

  /* RESPONSIVE */
  @media (max-width: 768px) {
    nav { padding: 16px 24px; } .nav-links { gap: 20px; } .nav-links a { font-size: 12px; }
    .contact { padding: 48px 24px 160px; }
    footer { padding: 20px 24px; flex-direction: column; gap: 10px; }
  }

  /* FADE IN */
  .fade-in { opacity: 0; transform: translateY(12px); animation: fadeUp 0.6s cubic-bezier(0.16,1,0.3,1) forwards; }
  @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }
  .fade-in:nth-child(2) { animation-delay: 0.08s; }
  .fade-in:nth-child(3) { animation-delay: 0.16s; }
</style>
